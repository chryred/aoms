[agent]
system_name = "test-system"
display_name = "로컬 테스트 서버"
instance_role = "app"
host = "test-container"
collect_interval_secs = 15
top_process_count = 5

[remote_write]
# dev-prometheus 컨테이너 — dev-net 내부 DNS
endpoint = "http://dev-prometheus:9090/api/v1/write"
batch_size = 500
timeout_secs = 10
wal_dir = "/var/lib/synapse-agent/wal"
wal_retention_hours = 2

[collectors]
cpu = true
memory = true
disk = true
network = true
process = true
tcp_connections = true
log_monitor = true
web_servers = false
preprocessor = false
heartbeat = true

[log_monitor]
paths = ["/var/log/app/app.log"]
keywords = ["ERROR", "CRITICAL", "PANIC", "Fatal", "Exception", "FATAL"]
log_type = "app"

[[services]]
name = "generate-logs"
display_name = "로그 생성기"
process_match = "generate-logs"
