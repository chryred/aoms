# =============================================================================
# synapse-agent 설정 샘플 — 1개 인프라에 여러 WAS 서비스가 있는 경우
#
# [배포 구조]
#
#  물리 서버 192.168.10.100
#  ├── (root/infra 계정)  synapse-agent  →  /opt/synapse-agent/config.toml
#  │     역할: cpu / memory / disk / network / tcp / process 수집
#  │
#  ├── (jeussic 계정)     synapse-agent  →  /home/jeussic/synapse-agent/config.toml
#  │     역할: 고객경험시스템 로그 + WebtoB access log 수집
#  │
#  └── (jeuserp 계정)     synapse-agent  →  /home/jeuserp/synapse-agent/config.toml
#        역할: ERP시스템 로그 수집
#
# [왜 계정을 분리하는가]
#
#   JEUS/WebtoB 로그 파일은 서비스 기동 계정 소유(예: jeussic:jeussic, 0640).
#   synapse-agent가 다른 계정으로 실행되면 읽기 권한 없음 → 로그 수집 불가.
#
#   선택지 A (권장) — 계정별 별도 에이전트 인스턴스
#     각 서비스 계정이 자신의 synapse-agent를 직접 실행.
#     OS 권한 모델을 그대로 유지, sudo/setfacl 불필요.
#     → 이 파일의 방식
#
#   선택지 B — 단일 에이전트 + ACL
#     인프라 에이전트 계정(synapse)에 setfacl로 타 계정 로그 읽기 권한 부여.
#     에이전트 1개로 관리가 단순하나, ACL 누락 시 수집 중단.
#     → setfacl -m u:synapse:r /home/jeussic/logs/*.log
#
# [교차 분석 연결 원리]
#
#   Prometheus label: host = "192.168.10.100"
#   세 에이전트가 모두 동일한 host 값을 발행 → 동일 서버임을 인식.
#
#   system_name은 각 서비스를 구분하는 admin-api 식별자.
#   PostgreSQL systems 테이블의 system_name 컬럼과 반드시 일치해야 함.
#   불일치 시: 알림 수신은 되지만 담당자 조회 실패 → Teams 알림 미발송.
#
#     에이전트 system_name  ←→  systems.system_name (PostgreSQL)
#     ──────────────────────────────────────────────────────────
#     "server-a"               서버 전체 인프라 시스템 등록
#     "jeussic"                고객경험시스템 등록
#     "jeuserp"                ERP시스템 등록
#
# [파일 구성]
#   이 파일은 세 가지 설정을 하나의 샘플에 담았습니다.
#   실제 배포 시 각 계정 home 디렉토리에 config.toml 을 분리해서 사용하세요.
#   → 케이스 1만 활성, 케이스 2/3은 주석 처리
# =============================================================================


# =============================================================================
# 케이스 1: 인프라 에이전트 (root 또는 전용 infra 계정으로 실행)
#
# 파일 위치: /opt/synapse-agent/config.toml
# 실행: nohup /opt/synapse-agent/synapse-agent /opt/synapse-agent/config.toml &
#       또는 systemd: ExecStart=/opt/synapse-agent/synapse-agent /opt/synapse-agent/config.toml
# =============================================================================

[agent]
system_name           = "server-a"          # PostgreSQL systems.system_name 과 일치 필수
display_name          = "서버A (인프라)"     # Teams 알림 표시명
instance_role         = "infra"             # 메트릭 레이블 구분용
host                  = "192.168.10.100"    # 교차 분석 연결 키 — 세 에이전트 모두 동일값
collect_interval_secs = 15
top_process_count     = 20                  # CPU 상위 N개 프로세스 추적
log_dir               = "/opt/synapse-agent/logs"   # 로그 디렉토리 (기본: ./logs)
log_retention_days    = 7                   # 로그 보관 일수 (기본: 7)

[remote_write]
endpoint            = "http://192.168.10.1:9090/api/v1/write"
batch_size          = 500
timeout_secs        = 10
wal_dir             = "/opt/synapse-agent/wal"
wal_retention_hours = 2

[collectors]
cpu             = true    # ✅ 서버 전체 CPU (per-core + load avg)
memory          = true    # ✅ 서버 전체 메모리
disk            = true    # ✅ 서버 전체 디스크 I/O
network         = true    # ✅ 서버 전체 네트워크
process         = true    # ✅ 전체 프로세스 top-N (services 매핑 포함)
tcp_connections = true    # ✅ TCP 연결 상태 (ESTABLISHED / TIME_WAIT 등)
log_monitor     = false   # ❌ 로그는 각 WAS 계정 에이전트가 담당
web_servers     = false   # ❌ 웹 access log도 WAS 계정 에이전트 담당
preprocessor    = false
heartbeat       = true

[log_monitor]
# log_monitor = false 이므로 아래 설정은 무시됨 (형식 참고용)
paths    = []
keywords = ["ERROR", "CRITICAL", "PANIC", "Fatal", "Exception"]
log_type = "app"

# 인프라 에이전트의 process 수집기가 서비스 프로세스를 식별하기 위해 등록.
# process_match: /proc/[pid]/cmdline 에 포함된 문자열로 매칭
# → cpu_usage_percent / process_memory_bytes 에 service_name 레이블이 붙음
[[services]]
name          = "jeussic-domain"
display_name  = "고객경험시스템 도메인"
process_match = "jeussic"

[[services]]
name          = "jeuserp-domain"
display_name  = "ERP시스템 도메인"
process_match = "jeuserp"

[[services]]
name          = "webtob"
display_name  = "WebtoB 웹서버"
process_match = "wsadmin"


# =============================================================================
# 케이스 2: WAS 에이전트 — 고객경험시스템 (jeussic 계정으로 실행)
#
# 파일 위치: /home/jeussic/synapse-agent/config.toml
# 실행: nohup ~/synapse-agent/synapse-agent ~/synapse-agent/config.toml &
#
# 이 에이전트는 jeussic 계정 권한으로 실행되므로 jeussic 소유 로그만 읽을 수 있음.
# CPU/메모리 등 시스템 메트릭은 인프라 에이전트(케이스 1)가 담당.
# =============================================================================

