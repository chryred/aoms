# =============================================================================
# [에이전트 간 관계 요약]
#
#  레이블           인프라 에이전트    jeussic 에이전트   jeuserp 에이전트
#  ─────────────────────────────────────────────────────────────────────────
#  system_name      "server-a"         "jeussic"          "jeuserp"
#  instance_role    "infra"            "was"              "was"
#  host             "192.168.10.100"   "192.168.10.100"   "192.168.10.100"  ← 교차 분석 키
#
#  수집 메트릭
#  ─────────────────────────────────────────────────────────────────────────
#  cpu_usage_percent     ✅              ❌                 ❌
#  memory_used_bytes     ✅              ❌                 ❌
#  disk_bytes_total      ✅              ❌                 ❌
#  process_cpu_percent   ✅ (서비스 매핑 포함)  ❌           ❌
#  log_error_total       ❌              ✅ (jeussic 로그)  ✅ (jeuserp 로그)
#  http_request_total    ❌              ✅ (webtob)        ❌
#  agent_heartbeat       ✅              ✅                 ✅
#
# [PostgreSQL systems 테이블 등록 예시]
#
#   INSERT INTO systems (system_name, display_name, teams_webhook_url) VALUES
#     ('server-a', '서버A 인프라',   'https://outlook.office.com/webhook/...'),
#     ('jeussic',  '고객경험시스템', 'https://outlook.office.com/webhook/...'),
#     ('jeuserp',  'ERP시스템',      'https://outlook.office.com/webhook/...');
#
# [Prometheus 교차 분석 쿼리 예시]
#
#   # 서버 A 전체 CPU
#   cpu_usage_percent{host="192.168.10.100", core="total"}
#
#   # 동일 서버의 jeussic 로그 에러율 (분당)
#   sum(rate(log_error_total{host="192.168.10.100", system_name="jeussic"}[5m])) * 60
#
#   # CPU 85% 초과 시점의 jeussic 에러 상관 (LLM이 이 패턴을 분석함)
#   rate(log_error_total{host="192.168.10.100", system_name="jeussic"}[5m])
#     and on() cpu_usage_percent{host="192.168.10.100", core="total"} > 85
# =============================================================================
