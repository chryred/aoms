services:
  ollama:
    image: ollama/ollama:0.18.0
    container_name: synapse-ollama
    ports:
      - "11434:11434"
    volumes:
      - /app/synapse/services/ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - llm-network

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: synapse-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /app/synapse/services/qdrant-storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          memory: 8192M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
