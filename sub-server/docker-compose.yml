# Sub-Server (Server B) — 벡터 DB 전용
#
# ADR-011 이전: Ollama(임베딩) + Qdrant
# ADR-011 이후: Qdrant만 유지 (임베딩은 log-analyzer 컨테이너 내 FastEmbed ONNX로 이전)

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: synapse-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /app/synapse/services/qdrant-storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          memory: 8192M
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
