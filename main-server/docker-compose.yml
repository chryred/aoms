services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: synapse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - ./configs/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro,z
      - ./configs/prometheus/web.yml:/etc/prometheus/web.yml:ro,z   # Basic Auth
      - prometheus_data:/prometheus:z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web.yml'                # Basic Auth 활성화
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=15GB'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    mem_limit: 2560m
    cpus: '1.0'
    restart: unless-stopped
    networks:
      - synapse-net

  alertmanager:
    image: prom/alertmanager:main
    container_name: synapse-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro,z
    mem_limit: 128m
    cpus: '0.2'
    restart: unless-stopped
    networks:
      - synapse-net

  grafana:
    image: grafana/grafana:12.4.0
    container_name: synapse-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
      - grafana_data:/var/lib/grafana:z
      - /app/synapse/ssl:/etc/grafana/ssl:ro,z                      # HTTPS 인증서
    environment:
      # 인증 설정
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_PASSWORD_MIN_LENGTH=12
      # HTTPS/SSL 설정 (자체 서명 인증서)
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/ssl/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/ssl/grafana.key
      - GF_SERVER_ROOT_URL=https://%(domain)s:3001/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # 보안 강화
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=
      # 시간대
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Seoul
      # Prometheus datasource
      - PROM_URL=http://prometheus:9090
      - PROM_USER=${PROM_USER}
      - PROM_PASS=${PROM_PASS}
    mem_limit: 512m
    cpus: '0.3'
    depends_on: [prometheus]
    restart: unless-stopped
    networks:
      - synapse-net

  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=synapse
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data:z
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro,z
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro,z
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    mem_limit: 512m
    cpus: '0.3'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - synapse-net

  admin-api:
    image: synapse-admin-api:1.0       # 사전 빌드 후 load된 이미지
    container_name: synapse-admin-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse:${DB_PASSWORD}@postgres:5432/synapse
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      - LOG_ANALYZER_URL=http://log-analyzer:8000
      - FRONTEND_EXTERNAL_URL=${FRONTEND_EXTERNAL_URL}
      # 인증 / 보안
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # Prometheus (교차 분석 / 에이전트 remote-write)
      - PROMETHEUS_URL=http://prometheus:9090
      - AGENT_PROMETHEUS_URL=${AGENT_PROMETHEUS_URL}
      - PROMETHEUS_ANALYZE_INTERVAL_SECONDS=${PROMETHEUS_ANALYZE_INTERVAL_SECONDS:-300}
      # LLM (llm_client.py Strategy)
      - LLM_TYPE=${LLM_TYPE}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_AGENT_CODE=${LLM_AGENT_CODE}
      - LLM_MODEL=${LLM_MODEL}
      # DB 수집기
      - DB_COLLECT_INTERVAL_SECS=${DB_COLLECT_INTERVAL_SECS:-${ORACLE_COLLECT_INTERVAL_SECS:-60}}
      - AGENT_BINARY_PATH=${AGENT_BINARY_PATH:-/app/bin/agent-v}
    mem_limit: 256m
    cpus: '0.3'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synapse-net

  log-analyzer:
    image: synapse-log-analyzer:1.0    # 사전 빌드 후 load된 이미지
    container_name: synapse-log-analyzer
    ports:
      - "8000:8000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - ADMIN_API_URL=http://admin-api:8080
      - ANALYSIS_INTERVAL_SECONDS=${ANALYSIS_INTERVAL_SECONDS:-300}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      # LLM (llm_client.py Strategy — ADR-001)
      # 담당자별 API key: contacts.llm_api_key 우선, 없으면 아래 LLM_API_KEY 폴백
      - LLM_TYPE=${LLM_TYPE}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_AGENT_CODE=${LLM_AGENT_CODE}
      - LLM_MODEL=${LLM_MODEL}
      # Phase 4b: 벡터 DB (Server B)
      - OLLAMA_URL=${OLLAMA_URL}
      - EMBED_MODEL=${EMBED_MODEL:-paraphrase-multilingual}
      - QDRANT_URL=${QDRANT_URL}
    mem_limit: 256m
    cpus: '0.3'
    depends_on: [admin-api]
    restart: unless-stopped
    networks:
      - synapse-net
  frontend:
    image: synapse-frontend:1.0           # 사전 빌드 후 load된 이미지
    container_name: synapse-frontend
    ports:
      - "3001:80"
    mem_limit: 64m
    cpus: '0.1'
    depends_on: [admin-api, log-analyzer]
    restart: unless-stopped
    networks:
      - synapse-net

  n8n:
    image: n8nio/n8n:1.44.0
    container_name: synapse-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${MONITORING_SERVER_IP}:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=synapse
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=n8n
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_LOG_LEVEL=info
      # 워크플로우 내 $env 변수 접근 허용
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # 서비스 URL (Docker 내부 네트워크)
      - LOG_ANALYZER_URL=http://log-analyzer:8000
      - ADMIN_API_URL=http://admin-api:8080
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - QDRANT_URL=${QDRANT_URL}
      - EMBED_MODEL=${EMBED_MODEL:-bge-m3}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synapse-net

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
  n8n_data:

networks:
  synapse-net:
    driver: bridge
