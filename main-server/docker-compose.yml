services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: aoms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - ./configs/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro,z
      - ./configs/prometheus/web.yml:/etc/prometheus/web.yml:ro,z   # Basic Auth
      - prometheus_data:/prometheus:z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web.yml'                # Basic Auth 활성화
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=15GB'
      - '--web.enable-lifecycle'
    mem_limit: 2560m
    cpus: '1.0'
    restart: unless-stopped
    networks:
      - aoms-net

  alertmanager:
    image: prom/alertmanager:main
    container_name: aoms-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro,z
    mem_limit: 128m
    cpus: '0.2'
    restart: unless-stopped
    networks:
      - aoms-net

  loki:
    image: grafana/loki:main-26d9031
    container_name: aoms-loki
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro,z
      - loki_data:/loki:z
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 1536m
    cpus: '0.5'
    restart: unless-stopped
    networks:
      - aoms-net

  grafana:
    image: grafana/grafana:12.4.0
    container_name: aoms-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
      - grafana_data:/var/lib/grafana:z
      - /app/aoms/ssl:/etc/grafana/ssl:ro,z                        # HTTPS 인증서
    environment:
      # 인증 설정
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_PASSWORD_MIN_LENGTH=12
      # HTTPS/SSL 설정 (자체 서명 인증서)
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/ssl/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/ssl/grafana.key
      - GF_SERVER_ROOT_URL=https://%(domain)s:3000/
      # 보안 강화
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_ALLOW_EMBEDDING=false
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=
      # 시간대
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Seoul
      # Prometheus
      - PROM_PASS=${PROM_PASS}
    mem_limit: 512m
    cpus: '0.3'
    depends_on: [prometheus, loki]
    restart: unless-stopped
    networks:
      - aoms-net

  postgres:
    image: postgres:16-alpine
    container_name: aoms-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=aoms
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data:z
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro,z
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro,z
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    mem_limit: 512m
    cpus: '0.3'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aoms -d aoms"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aoms-net

  admin-api:
    image: aoms-admin-api:1.0       # 사전 빌드 후 load된 이미지
    container_name: aoms-admin-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://aoms:${DB_PASSWORD}@postgres:5432/aoms
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      - LLM_API_URL=${LLM_API_URL}
    mem_limit: 256m
    cpus: '0.3'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aoms-net

  log-analyzer:
    image: aoms-log-analyzer:1.0    # 사전 빌드 후 load된 이미지
    container_name: aoms-log-analyzer
    ports:
      - "8000:8000"
    environment:
      - LOKI_URL=http://loki:3100
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}         # 기본 API key (담당자별 key 미등록 시 사용)
      - LLM_AGENT_CODE=${LLM_AGENT_CODE}
      - ADMIN_API_URL=http://admin-api:8080
      - ANALYSIS_INTERVAL_SECONDS=300
      # 담당자별 API key: contacts.llm_api_key에서 조회
      # → 시스템별 primary 담당자의 llm_api_key가 있으면 해당 key로 LLM 호출
      # → 없으면 위 LLM_API_KEY (기본값) 사용
      # Phase 4b: 벡터 DB (Server B)
      - OLLAMA_URL=${OLLAMA_URL}
      - EMBED_MODEL=${EMBED_MODEL:-bge-m3}
      - QDRANT_URL=${QDRANT_URL}
    mem_limit: 256m
    cpus: '0.3'
    depends_on: [loki, admin-api]
    restart: unless-stopped
    networks:
      - aoms-net
  n8n:
    image: n8nio/n8n:1.44.0
    container_name: aoms-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${MONITORING_SERVER_IP}:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=aoms
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=n8n
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aoms-net

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  postgres_data:
  n8n_data:

networks:
  aoms-net:
    driver: bridge
