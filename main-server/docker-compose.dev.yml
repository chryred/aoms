# 로컬 개발용 docker-compose
# 인프라 서비스만 실행 — admin-api, log-analyzer는 직접 uvicorn으로 실행
#
# 사용법:
#   docker compose -f docker-compose.dev.yml up -d
#   또는 프로젝트 루트에서: make dev-up

services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=synapse
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=synapse
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./services/admin-api/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dev-net

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: dev-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_dev_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Mac에서 호스트 접근
    restart: unless-stopped
    networks:
      - dev-net

  alertmanager:
    image: prom/alertmanager:main
    container_name: dev-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/dev/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Mac에서 호스트 접근
    restart: unless-stopped
    networks:
      - dev-net

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: dev-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - dev-net

  n8n:
    image: n8nio/n8n:1.44.0
    container_name: dev-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=synapse
      - DB_POSTGRESDB_USER=synapse
      - DB_POSTGRESDB_PASSWORD=synapse
      - DB_POSTGRESDB_SCHEMA=n8n
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_LOG_LEVEL=info
      # 워크플로우 내 $env 변수 접근 허용
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # 로컬 서비스 URL (host.docker.internal = Mac 호스트)
      - LOG_ANALYZER_URL=http://host.docker.internal:8000
      - ADMIN_API_URL=http://host.docker.internal:8080
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - OLLAMA_URL=${OLLAMA_URL}
      - QDRANT_URL=${QDRANT_URL}
      - EMBED_MODEL=bge-m3
      - LLM_API_URL=${LLM_API_URL:-}
    volumes:
      - n8n_dev_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dev-net

  grafana:
    image: grafana/grafana:12.4.0
    container_name: dev-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_dev_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_ROOT_URL=http://localhost:3001/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Seoul
      # Prometheus datasource (dev: 인증 없음)
      - PROM_URL=http://prometheus:9090
      - PROM_USER=
      - PROM_PASS=
    depends_on: [prometheus]
    restart: unless-stopped
    networks:
      - dev-net

  # frontend는 Docker 이미지 없이 `make run-frontend` (npm run dev)로 실행
  # docker compose에서 제외 — 빌드된 이미지(synapse-frontend:1.0) 없어도 dev-up 가능

  tempo:
    image: grafana/tempo:2.9.1
    container_name: dev-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./configs/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_dev_data:/var/tempo
    ports:
      - "3200:3200"
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - dev-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: dev-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yml"]
    volumes:
      - ./configs/otel-collector/otel-collector-config.yml:/etc/otel/otel-collector-config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "13133:13133"            # health_check (dev only)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - tempo
    restart: unless-stopped
    networks:
      - dev-net

  ollama:
    image: ollama/ollama:0.18.0
    container_name: dev-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    restart: unless-stopped
    networks:
      - dev-net

volumes:
  postgres_dev_data:
  prometheus_dev_data:
  qdrant_dev_data:
  n8n_dev_data:
  grafana_dev_data:
  ollama_dev_data:
  tempo_dev_data:

networks:
  dev-net:
    driver: bridge
