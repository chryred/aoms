global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 로컬에서 직접 실행 중인 admin-api 스크레이핑 (host.docker.internal = Mac 호스트)
  - job_name: "admin-api"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  # ── 동적 수집기 타겟 (admin-api DB 기반 자동 등록) ──────────────────────────
  # collector_config에 등록된 enabled 수집기를 1분마다 자동 반영 (HTTP SD)
  - job_name: "aoms-dynamic"
    http_sd_configs:
      - url: http://host.docker.internal:8080/api/v1/prometheus/targets
        refresh_interval: 1m
