global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 로컬에서 직접 실행 중인 admin-api 스크레이핑 (host.docker.internal = Mac 호스트)
  - job_name: "admin-api"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics
