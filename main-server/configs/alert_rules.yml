# Synapse — Prometheus Alert Rules
#
# 감지 유형 3가지:
#   spike     — 5분 평균이 1시간 평균 대비 30% 급등 (for 2m)
#   trending  — predict_linear 으로 30분 후 임계치 도달 예측 (for 5m)
#   threshold — 절대값 임계치 초과 (for 3m)
#
# 실제 메트릭명 확인:
#   curl http://localhost:9090/api/v1/label/__name__/values | python3 -m json.tool | grep -E "cpu|mem"
#
# 공통 labels (Alertmanager → admin-api 매핑에 필수):
#   system_name   → systems.system_name (담당자 조회 키)
#   instance_role → 서버 역할 (was/web/db 등)
#   host          → 호스트명
#   metric_name   → vector_client build_metric_description 에서 사용
#   metric_value  → 현재 측정값 (Teams 카드에 표시)

groups:

  # ── CPU 감지 ──────────────────────────────────────────────────────────────
  - name: cpu_detection
    interval: 1m
    rules:

      # 1-A. 폭등 감지
      #   조건: 최근 5분 평균이 최근 1시간 평균 대비 30% 초과
      #   오탐 방지: CPU > 10% (저부하 서버에서 1%→1.3% 같은 오탐 방지)
      - alert: CPUSuddenSpike
        expr: |
          (
            avg_over_time(node_cpu_usage_percent[5m])
            / avg_over_time(node_cpu_usage_percent[1h])
          ) > 1.3
          and avg_over_time(node_cpu_usage_percent[5m]) > 10
        for: 2m
        labels:
          severity: warning
          alert_category: spike
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: cpu_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "CPU 폭등 감지 — 1시간 평균 대비 30% 이상 급등"
          description: "{{ $labels.host }} CPU가 1시간 평균 대비 급등 (현재: {{ $value | humanize }}%)"

      # 1-B. 지속 증가 감지
      #   조건: 최근 30분 추세(선형 회귀)로 30분 후 75% 초과 예측
      #   효과: 임계치 도달 전 약 30분 선행 경고
      - alert: CPUSteadyIncrease
        expr: predict_linear(node_cpu_usage_percent[30m], 1800) > 75
        for: 5m
        labels:
          severity: warning
          alert_category: trending
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: cpu_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "CPU 지속 증가 — 30분 후 75% 초과 예측"
          description: "{{ $labels.host }} CPU 상승 추세 지속, 30분 이내 임계치 도달 예상"

      # 1-C. 절대 임계치 (위험)
      - alert: CPUHighUsage
        expr: node_cpu_usage_percent > 85
        for: 3m
        labels:
          severity: critical
          alert_category: threshold
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: cpu_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "CPU 사용률 위험 수준"
          description: "{{ $labels.host }} CPU {{ $value | humanize }}% — 임계치(85%) 초과"

  # ── 메모리 감지 ───────────────────────────────────────────────────────────
  - name: memory_detection
    interval: 1m
    rules:

      # 2-A. 폭등 감지
      - alert: MemorySuddenSpike
        expr: |
          (
            avg_over_time(node_memory_usage_percent[5m])
            / avg_over_time(node_memory_usage_percent[1h])
          ) > 1.3
          and avg_over_time(node_memory_usage_percent[5m]) > 10
        for: 2m
        labels:
          severity: warning
          alert_category: spike
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: memory_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "메모리 폭등 감지 — 1시간 평균 대비 30% 이상 급등"
          description: "{{ $labels.host }} 메모리가 1시간 평균 대비 급등"

      # 2-B. 지속 증가 감지
      - alert: MemorySteadyIncrease
        expr: predict_linear(node_memory_usage_percent[30m], 1800) > 80
        for: 5m
        labels:
          severity: warning
          alert_category: trending
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: memory_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "메모리 지속 증가 — 30분 후 80% 초과 예측"
          description: "{{ $labels.host }} 메모리 상승 추세 지속"

      # 2-C. 절대 임계치 (위험)
      - alert: MemoryHighUsage
        expr: node_memory_usage_percent > 90
        for: 3m
        labels:
          severity: critical
          alert_category: threshold
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: memory_usage
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "메모리 사용률 위험 수준"
          description: "{{ $labels.host }} 메모리 {{ $value | humanize }}% — 임계치(90%) 초과"

  # ── 로그 에러 감지 (synapse_agent log_error_total) ────────────────────────
  - name: log_error_detection
    interval: 30s
    rules:

      # 3-A. 로그 에러 급증 (최근 1분간 고유 에러 시계열 수 > 30건)
      #   synapse_agent는 에러 로그 1건마다 template 라벨이 다른 새 시계열(value=1)을 생성하므로
      #   rate() 대신 count_over_time으로 1분 내 활성 시계열 수를 카운트한다.
      - alert: LogErrorBurst
        expr: sum by(system_name, instance_role, host) (count_over_time(log_error_total[1m])) > 30
        for: 1m
        labels:
          severity: warning
          alert_category: spike
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: log_error_rate
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "로그 에러 급증 — 분당 30건 이상"
          description: "{{ $labels.host }} 에러 로그 급증 (최근 1분 {{ $value | humanize }}건)"

      # 3-B. FATAL/CRITICAL 로그 발생 (즉시 경고)
      - alert: LogFatalDetected
        expr: count by(system_name, instance_role, host) (count_over_time(log_error_total{level=~"FATAL|CRITICAL"}[1m])) > 0
        for: 0s
        labels:
          severity: critical
          alert_category: threshold
          system_name: "{{ $labels.system_name }}"
          instance_role: "{{ $labels.instance_role }}"
          host: "{{ $labels.host }}"
          metric_name: log_fatal
          metric_value: "{{ $value | humanize }}"
        annotations:
          summary: "FATAL/CRITICAL 로그 감지"
          description: "{{ $labels.host }} FATAL/CRITICAL 로그 {{ $value | humanize }}건 발생"
