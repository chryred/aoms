services:
  ssh-test:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: aoms-ssh-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
      - PASSWORD_ACCESS=true
      - USER_NAME=testuser
      - USER_PASSWORD=test1234!
      - SUDO_ACCESS=true
    ports:
      - "2222:2222"
    volumes:
      - ssh-test-config:/config
    restart: unless-stopped

volumes:
  ssh-test-config:
